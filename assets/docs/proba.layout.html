<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provocări Flexbox și Grid</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 40px;
            background-color: #f5f5f5;
        }

        h2 { border-bottom: 2px solid #333; padding-bottom: 10px; }

        /* --- SECȚIUNEA A: FLEXBOX --- */
        .flex-container {
            display: flex;
            flex-direction: row;
            justify-content: space-between; /* Împinge box-1 la start și box-3 la end pe orizontală */
            height: 80vh;
            border: 6px double #2c3e50;
            background-color: #fff;
            margin-bottom: 50px;
            padding: 15px;
        }

        .box {
            width: 120px;
            height: 120px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .box-1 { 
            background-color: #e74c3c; 
            align-self: flex-start; /* Aliniere sus */
        }

        .box-2 { 
            background-color: #f1c40f; 
            align-self: center;     /* Aliniere centru vertical */
        }

        .box-3 { 
            background-color: #2ecc71; 
            align-self: flex-end;   /* Aliniere jos */
        }

        /* --- SECȚIUNEA B: GRID --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Două coloane egale */
            gap: 25px; /* Spațiere exactă conform cerinței */
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ccc;
        }

        .grid-item {
            padding: 40px;
            text-align: center;
            font-weight: bold;
            color: #333;
            /* Culoare de fundal RGBA cu transparență */
            background-color: rgba(52, 152, 219, 0.3); 
            border: 2px solid rgba(52, 152, 219, 0.6);
        }

        .item-1 {
            /* Ocupă ambele coloane (lățime completă) */
            grid-column: span 2;
            background-color: rgba(155, 89, 182, 0.3);
        }
    </style>
</head>
<body>

    <h2>A. Provocarea Flexbox (Poziționare Geometrică)</h2>
    
    <div class="flex-container">
        <div class="box box-1">Box 1</div>
        <div class="box box-2">Box 2</div>
        <div class="box box-3">Box 3</div>
        
        <!-- 
            EXPLICAȚIE TEHNICĂ:
            Pentru a "rupe" alinierea standard a elementelor în containerul Flex:
            1. Am folosit 'justify-content: space-between' pe părinte pentru a separa elementele 
               la extremități pe axa orizontală.
            2. Am folosit proprietatea 'align-self' pe fiecare copil în parte pentru a controla 
               poziția pe axa verticală (Y). Astfel, box-1 rămâne sus (flex-start), 
               box-2 coboară la mijloc (center), iar box-3 se fixează jos (flex-end).
        -->
    </div>

    <h2>B. Provocarea Grid (Sistemul de Mozaic)</h2>

    <div class="grid-container">
        <div class="grid-item item-1">Element 1 (Span 2)</div>
        <div class="grid-item">Element 2 (Coloană 1)</div>
        <div class="grid-item">Element 3 (Coloană 2)</div>
        <div class="grid-item">Element 4 (Auto-row)</div>
    </div>

</body>
</html>
