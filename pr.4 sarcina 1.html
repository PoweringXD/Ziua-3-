<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RC 251 | Cealic Damian — Audit Final</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">

  <style>
/* ════════════════════════════════════════════════════════════════
   _variables.css
   Ierarhie: Primitive → Semantic → Component
   CRITERIU: Toate variabilele ierarhizate în 3 niveluri clare.
   ════════════════════════════════════════════════════════════════ */

:root {

  /* ── LAYER 1: PRIMITIVE TOKENS ──────────────────────────────
     Valori brute, fără context. Nu se folosesc direct în CSS.
     Reprezintă paleta și scala de bază a sistemului.
  ──────────────────────────────────────────────────────────── */
  --primitive-black-900:    #080808;
  --primitive-black-800:    #111111;
  --primitive-white:        #ffffff;
  --primitive-white-03:     rgba(255,255,255,0.03);
  --primitive-white-10:     rgba(255,255,255,0.10);
  --primitive-white-16:     rgba(255,255,255,0.16);
  --primitive-white-20:     rgba(255,255,255,0.20);
  --primitive-white-35:     rgba(255,255,255,0.35);

  --primitive-cyan-100:     #00f2ff;
  --primitive-cyan-10:      rgba(0,242,255,0.10);
  --primitive-cyan-08:      rgba(0,242,255,0.08);
  --primitive-cyan-15:      rgba(0,242,255,0.15);
  --primitive-cyan-35:      rgba(0,242,255,0.35);
  --primitive-cyan-40:      rgba(0,242,255,0.40);

  --primitive-green-100:    #00ff88;
  --primitive-green-08:     rgba(0,255,136,0.08);
  --primitive-green-10:     rgba(0,255,136,0.10);
  --primitive-green-40:     rgba(0,255,136,0.40);

  --primitive-red-100:      #ff003c;
  --primitive-red-08:       rgba(255,0,60,0.08);
  --primitive-red-40:       rgba(255,0,60,0.40);
  --primitive-red-55:       rgba(255,0,60,0.55);

  --primitive-amber-100:    #ffaa00;
  --primitive-amber-08:     rgba(255,170,0,0.08);
  --primitive-amber-15:     rgba(255,170,0,0.15);
  --primitive-amber-40:     rgba(255,170,0,0.40);
  --primitive-amber-60:     rgba(255,170,0,0.60);

  --primitive-gray-500:     #888888;

  --primitive-space-4:      4px;
  --primitive-space-5:      5px;
  --primitive-space-6:      6px;
  --primitive-space-8:      8px;
  --primitive-space-10:     10px;
  --primitive-space-12:     12px;
  --primitive-space-14:     14px;
  --primitive-space-16:     16px;
  --primitive-space-20:     20px;
  --primitive-space-28:     28px;
  --primitive-space-36:     36px;
  --primitive-space-40:     40px;
  --primitive-space-48:     48px;

  --primitive-radius-4:     4px;
  --primitive-radius-8:     8px;
  --primitive-radius-16:    16px;

  --primitive-duration-200: 0.2s;
  --primitive-duration-300: 0.3s;
  --primitive-easing-out:   ease;

  --primitive-font-mono:    'Share Tech Mono', monospace;
  --primitive-font-display: 'Rajdhani', sans-serif;

  --primitive-fs-10: 0.55rem;
  --primitive-fs-11: 0.60rem;
  --primitive-fs-13: 0.72rem;
  --primitive-fs-14: 0.80rem;
  --primitive-fs-16: 0.90rem;
  --primitive-fs-26: 1.60rem;

  --primitive-ls-1: 0.05em;
  --primitive-ls-2: 0.10em;
  --primitive-ls-3: 0.15em;
  --primitive-ls-4: 0.20em;

  --primitive-grid-size: 40px;


  /* ── LAYER 2: SEMANTIC TOKENS ───────────────────────────────
     Primitive cu intenție. Descriu CE sunt, nu CUM arată.
     Folosite de componente pentru a înțelege contextul.
  ──────────────────────────────────────────────────────────── */

  /* Backgrounds */
  --color-bg:               var(--primitive-black-900);
  --color-surface:          var(--primitive-white-03);
  --color-surface-hover:    var(--primitive-black-800);

  /* Borders */
  --color-border-default:   var(--primitive-white-10);
  --color-border-subtle:    var(--primitive-white-16);
  --color-border-focus:     var(--primitive-cyan-100);
  --color-border-success:   var(--primitive-green-40);
  --color-border-error:     var(--primitive-red-40);
  --color-border-warning:   var(--primitive-amber-40);

  /* Text */
  --color-text-primary:     var(--primitive-white);
  --color-text-muted:       var(--primitive-gray-500);
  --color-text-disabled:    var(--primitive-white-20);
  --color-text-accent:      var(--primitive-cyan-40);

  /* State colors */
  --color-focus:            var(--primitive-cyan-100);
  --color-success:          var(--primitive-green-100);
  --color-error:            var(--primitive-red-100);
  --color-warning:          var(--primitive-amber-100);

  /* Focus rings */
  --color-ring-focus:       var(--primitive-cyan-10);
  --color-ring-success:     var(--primitive-green-08);
  --color-ring-error:       var(--primitive-red-08);

  /* Shadows */
  --shadow-focus:           0 0 8px var(--color-focus);
  --shadow-success:         0 0 8px var(--color-success);
  --shadow-error:           0 0 8px var(--color-error);
  --shadow-warning:         0 0 8px var(--color-warning);

  /* Typography */
  --font-body:              var(--primitive-font-mono);
  --font-heading:           var(--primitive-font-display);

  --text-xs:    var(--primitive-fs-10);
  --text-sm:    var(--primitive-fs-11);
  --text-base:  var(--primitive-fs-13);
  --text-input: var(--primitive-fs-14);
  --text-btn:   var(--primitive-fs-16);
  --text-h1:    var(--primitive-fs-26);

  --tracking-tight:  var(--primitive-ls-1);
  --tracking-normal: var(--primitive-ls-2);
  --tracking-wide:   var(--primitive-ls-3);
  --tracking-wider:  var(--primitive-ls-4);

  /* Spacing */
  --space-1: var(--primitive-space-4);
  --space-2: var(--primitive-space-5);
  --space-3: var(--primitive-space-6);
  --space-4: var(--primitive-space-8);
  --space-5: var(--primitive-space-12);
  --space-6: var(--primitive-space-14);
  --space-7: var(--primitive-space-20);
  --space-8: var(--primitive-space-28);
  --space-9: var(--primitive-space-36);
  --space-10: var(--primitive-space-48);

  /* Radii */
  --radius-sm: var(--primitive-radius-8);
  --radius-md: var(--primitive-radius-16);
  --radius-xs: var(--primitive-radius-4);

  /* Motion */
  --duration-fast: var(--primitive-duration-200);
  --duration-med:  var(--primitive-duration-300);
  --ease-default:  var(--primitive-easing-out);
  --transition-fast: var(--duration-fast) var(--ease-default);
  --transition-med:  var(--duration-med)  var(--ease-default);

  /* Grid */
  --grid-line: rgba(0,242,255,0.025);


  /* ── LAYER 3: COMPONENT TOKENS ──────────────────────────────
     Semantic tokens specializate per-componentă.
     Permite modificarea unui singur element fără side-effects.
  ──────────────────────────────────────────────────────────── */

  /* card */
  --card-bg:            rgba(255,255,255,0.02);
  --card-border:        var(--color-border-default);
  --card-border-top:    var(--color-border-subtle);
  --card-shadow:        0 30px 80px rgba(0,0,0,0.60), 0 0 0 1px rgba(0,242,255,0.04);
  --card-radius:        var(--radius-md);
  --card-padding-y:     var(--space-10);
  --card-padding-x:     var(--primitive-space-40);
  --card-width:         440px;

  /* field */
  --field-label-color:        var(--color-text-muted);
  --field-label-floated-color: var(--color-focus);
  --field-hint-height:        1.2em; /* REZERVĂ SPAȚIU — previne Layout Shift */

  /* btn */
  --btn-disabled-bg:     var(--primitive-white-03);
  --btn-disabled-text:   var(--color-text-disabled);
  --btn-active-bg:       linear-gradient(135deg, var(--primitive-cyan-15), var(--primitive-green-10));
  --btn-active-border:   var(--color-border-focus);
  --btn-terms-bg:        linear-gradient(135deg, var(--primitive-amber-15), var(--primitive-amber-08));
  --btn-terms-border:    var(--color-border-warning);

  /* services */
  --services-empty-border: var(--color-border-default);
  --services-filled-border: var(--primitive-cyan-15);

  /* debug */
  --debug-color-layer-bg:    rgba(255,0,200,0.7);
  --debug-color-layer-card:  rgba(0,242,255,0.8);
  --debug-color-layer-label: rgba(0,255,136,0.7);
  --debug-color-layer-dot:   rgba(255,170,0,0.8);
  --debug-color-layer-btn:   rgba(255,60,60,0.8);
  --debug-color-layer-tag:   rgba(100,200,255,0.7);
}


/* ════════════════════════════════════════════════════════════════
   CRITICAL CSS — Above the Fold
   Stiluri necesare pentru prima randare fără scroll.
   ════════════════════════════════════════════════════════════════ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

.page {
  background: var(--color-bg);
  min-height: 100vh;
  display: grid;
  place-items: center;
  font-family: var(--font-body);
  color: var(--color-text-primary);
}

.page__grid-bg {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size: var(--primitive-grid-size) var(--primitive-grid-size);
  pointer-events: none;
  will-change: transform;
}

/* CRITERIU: card are doar class selector, specificitate (0,1,0) */
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-top-color: var(--card-border-top);
  backdrop-filter: blur(20px);
  border-radius: var(--card-radius);
  padding: var(--card-padding-y) var(--card-padding-x);
  width: var(--card-width);
  box-shadow: var(--card-shadow);
  filter: brightness(1);
  transition: filter var(--transition-med);
}

/* Max 2 niveluri: .card:focus-within — (0,2,0) — OK */
.card:focus-within {
  filter: brightness(1.12);
}

.card__header {
  margin-bottom: var(--space-9);
  text-align: center;
}

.card__title {
  font-family: var(--font-heading);
  font-size: var(--text-h1);
  font-weight: 700;
  letter-spacing: var(--tracking-normal);
  color: var(--color-text-primary);
  text-shadow: 0 0 20px rgba(0,242,255,0.30);
}

.card__subtitle {
  font-size: var(--text-sm);
  letter-spacing: var(--tracking-wider);
  color: var(--color-text-accent);
  margin-top: var(--space-3);
  text-transform: uppercase;
}

/* END CRITICAL CSS */


/* ════════════════════════════════════════════════════════════════
   _atoms.css — Elemente de bază
   ════════════════════════════════════════════════════════════════ */

.divider {
  width: 50px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--color-focus), transparent);
  opacity: 0.35;
  margin: var(--space-5) auto 0;
}

.card__footer {
  margin-top: var(--space-7);
  text-align: center;
  font-size: var(--text-xs);
  letter-spacing: var(--tracking-wide);
  color: rgba(255,255,255,0.15);
}

.card__footer-action {
  cursor: pointer;
  color: rgba(0,242,255,0.3);
  border-bottom: 1px solid rgba(0,242,255,0.15);
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  font-family: var(--font-body);
  font-size: var(--text-xs);
  letter-spacing: var(--tracking-wide);
}


/* ════════════════════════════════════════════════════════════════
   _molecules.css — BLOCK: field
   CRITERIU: Fără selectoare imbricate > 2 niveluri.
   CRITERIU: Fără ID-uri în CSS — doar clase.
   GPU: Floating label via transform (nu top/font-size animate).
   CLS fix: .field__hint are height rezervat → zero Layout Shift.
   ════════════════════════════════════════════════════════════════ */

.field {
  position: relative;
  /*
    LAYOUT SHIFT FIX:
    Rezervăm spațiu pentru hint de la început.
    Înlocuiește marginea dinamisă cu padding constant.
    Fără această rezervare, apariția hint-ului împinge
    elementele de dedesubt → Layout Shift vizibil.
  */
  padding-bottom: calc(var(--field-hint-height) + var(--space-2));
  margin-bottom: var(--space-4);
}

.field__input {
  width: 100%;
  background: var(--color-surface);
  border: 1px solid var(--color-border-default);
  border-radius: var(--radius-sm);
  padding: var(--space-6) var(--primitive-space-40) var(--space-6) var(--space-6);
  font-family: var(--font-body);
  font-size: var(--text-input);
  color: var(--color-text-primary);
  outline: none;
  /* Animăm doar compositor-safe properties */
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
  letter-spacing: var(--tracking-tight);
}

.field__input::placeholder { color: transparent; }

/*
  FLOATING LABEL — GPU optimizat
  ÎNAINTE (Layout Thrashing): animam top: 50% → 0 și font-size
  ACUM: transform: translateY + scale — compositor thread, zero reflow
*/
.field__label {
  position: absolute;
  left: var(--space-6);
  top: calc(var(--space-6) + var(--text-base)); /* centrat vertical față de input */
  transform: translateY(-50%);
  transform-origin: left center;
  font-size: var(--text-base);
  letter-spacing: var(--tracking-normal);
  color: var(--field-label-color);
  pointer-events: none;
  /* Animăm transform și color — ambele GPU / compositor */
  transition: transform var(--transition-fast), color var(--transition-fast);
  padding: 0 4px;
  background: transparent;
  will-change: transform;
}

/* Dot indicator */
.field__dot {
  position: absolute;
  right: var(--space-6);
  top: calc(var(--space-6) + var(--text-base));
  transform: translateY(-50%);
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: transparent;
  transition: background var(--transition-fast), box-shadow var(--transition-fast);
  pointer-events: none;
}

/*
  HINT — Layout Shift Fix
  Înlocuim height: 0 → auto (care cauzează reflow)
  cu un element cu înălțime fixă rezervată.
  Vizibilitatea e controlată prin opacity (GPU, nu reflow).
*/
.field__hint {
  position: absolute;
  bottom: 0;
  left: var(--space-6);
  height: var(--field-hint-height);   /* spațiu rezervat permanent */
  font-size: var(--text-xs);
  letter-spacing: var(--tracking-normal);
  color: var(--primitive-red-55);
  text-transform: uppercase;
  opacity: 0;
  /* opacity animat pe compositor — zero reflow, zero Layout Shift */
  transition: opacity var(--transition-fast);
  will-change: opacity;
}

/* ── Modifier: focus ── */
.field__input:focus {
  border-color: var(--color-border-focus);
  box-shadow: 0 0 0 2px var(--color-ring-focus), inset 0 0 20px rgba(0,242,255,0.03);
}

/* Max 2 niveluri: .field:focus-within .field__dot — (0,2,0) — OK */
.field:focus-within .field__dot {
  background: var(--color-focus);
  box-shadow: var(--shadow-focus);
}

/* Float label: selector cu pseudo-clasă — specificitate (0,2,0) — OK */
.field__input:focus + .field__label,
.field__input:not(:placeholder-shown) + .field__label {
  transform: translateY(-160%) scale(0.78);
  color: var(--field-label-floated-color);
  background: var(--color-bg);
}

/* ── Modifier: valid ── */
.field__input:valid:not(:placeholder-shown) {
  border-color: var(--color-border-success);
  box-shadow: 0 0 0 2px var(--color-ring-success);
}

.field__input:valid:not(:placeholder-shown) + .field__label {
  color: var(--color-success);
}

/* :has() — selector cu 2 pseudo-clase — specificitate (0,2,0) — OK */
.field:has(.field__input:valid:not(:placeholder-shown)) .field__dot {
  background: var(--color-success);
  box-shadow: var(--shadow-success);
}

/* ── Modifier: invalid ── */
.field__input:invalid:not(:placeholder-shown) {
  border-color: var(--color-border-error);
  box-shadow: 0 0 0 2px var(--color-ring-error);
}

.field__input:invalid:not(:placeholder-shown) + .field__label {
  color: var(--color-error);
}

.field:has(.field__input:invalid:not(:placeholder-shown)) .field__dot {
  background: var(--color-error);
  box-shadow: var(--shadow-error);
}

/*
  CRITERIU: Formularul comunică eroarea VIZUAL înainte de submit.
  opacity: 1 apare imediat la :invalid + :not(:placeholder-shown)
  fără să apese utilizatorul pe submit.
*/
.field:has(.field__input:invalid:not(:placeholder-shown)) .field__hint {
  opacity: 1;
}


/* ════════════════════════════════════════════════════════════════
   _molecules.css — BLOCK: services (Empty State)
   ════════════════════════════════════════════════════════════════ */

.services {
  margin-bottom: var(--space-8);
}

.services__label {
  display: block;
  font-size: var(--text-xs);
  letter-spacing: var(--tracking-wide);
  color: var(--color-text-muted);
  margin-bottom: var(--space-3);
  text-transform: uppercase;
}

.services__list {
  display: flex;
  gap: var(--space-4);
  flex-wrap: wrap;
  /* Rezervăm înălțimea minimă — previne Layout Shift la adăugare */
  min-height: 36px;
  border: 1px dashed var(--services-empty-border);
  border-radius: var(--radius-sm);
  padding: var(--space-4);
  position: relative;
  transition: border-color var(--transition-fast);
}

/* :empty — mesaj automat, zero JS, apare/dispare prin CSS */
.services__list:empty::before {
  content: 'NICIUN SERVICIU SELECTAT';
  font-size: var(--text-xs);
  letter-spacing: var(--tracking-wider);
  color: rgba(255,255,255,0.18);
  position: absolute;
  top: 50%;
  left: 50%;
  /* transform — nu top/left — pentru centrare fără reflow */
  transform: translate(-50%, -50%);
  white-space: nowrap;
  pointer-events: none;
}

.services__list:not(:empty) {
  border-color: var(--services-filled-border);
}

.services__tag {
  background: var(--primitive-cyan-08);
  border: 1px solid rgba(0,242,255,0.20);
  border-radius: var(--radius-xs);
  padding: var(--space-1) var(--primitive-space-10);
  font-size: var(--text-xs);
  letter-spacing: var(--tracking-normal);
  color: var(--color-focus);
  cursor: pointer;
  transition: opacity var(--transition-fast), transform var(--transition-fast);
  will-change: transform;
  user-select: none;
}

.services__tag:hover {
  transform: scale(1.05);
  opacity: 0.85;
}

.services__controls {
  display: flex;
  gap: var(--space-4);
  margin-top: var(--space-4);
}

.services__btn {
  font-family: var(--font-body);
  font-size: var(--text-xs);
  letter-spacing: var(--tracking-normal);
  color: rgba(0,242,255,0.50);
  background: transparent;
  border: 1px solid rgba(0,242,255,0.15);
  border-radius: var(--radius-xs);
  padding: var(--space-1) var(--primitive-space-10);
  cursor: pointer;
  transition: color var(--transition-fast), border-color var(--transition-fast);
}

.services__btn:hover {
  color: var(--color-focus);
  border-color: rgba(0,242,255,0.40);
}


/* ════════════════════════════════════════════════════════════════
   _molecules.css — BLOCK: terms (Checkbox)
   Complex Selector Puzzle — zero ID-uri, zero JS
   ════════════════════════════════════════════════════════════════ */

.terms {
  display: flex;
  align-items: center;
  gap: var(--primitive-space-10);
  margin-bottom: var(--space-7);
  cursor: pointer;
  user-select: none;
}

.terms__checkbox {
  position: absolute;
  opacity: 0;
  width: 0;
  height: 0;
}

.terms__box {
  width: 16px;
  height: 16px;
  border: 1px solid var(--primitive-white-20);
  border-radius: 3px;
  background: var(--color-surface);
  display: grid;
  place-items: center;
  flex-shrink: 0;
  transition: border-color var(--transition-fast), background var(--transition-fast);
}

.terms__box::after {
  content: '';
  width: 8px;
  height: 5px;
  border-left: 1.5px solid var(--color-success);
  border-bottom: 1.5px solid var(--color-success);
  /* GPU: transform scale — nu display:block/none */
  transform: rotate(-45deg) scale(0);
  transition: transform var(--transition-fast);
  will-change: transform;
}

/* Max 2 niveluri: .terms__checkbox:checked + .terms__box — (0,2,0) — OK */
.terms__checkbox:checked + .terms__box {
  border-color: var(--color-success);
  background: var(--primitive-green-10);
}

.terms__checkbox:checked + .terms__box::after {
  transform: rotate(-45deg) scale(1);
}

.terms__text {
  font-size: var(--text-xs);
  letter-spacing: var(--tracking-normal);
  color: var(--primitive-white-35);
}

.terms__link {
  color: rgba(0,242,255,0.60);
  text-decoration: none;
  border-bottom: 1px solid rgba(0,242,255,0.20);
}


/* ════════════════════════════════════════════════════════════════
   _molecules.css — BLOCK: btn (The Gatekeeper)
   CRITERIU: Fără ID-uri. Selectoare cu :has() pe .form — clase pure.
   ════════════════════════════════════════════════════════════════ */

.btn {
  width: 100%;
  padding: 15px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--primitive-white-10);
  font-family: var(--font-heading);
  font-size: var(--text-btn);
  font-weight: 700;
  letter-spacing: var(--tracking-wider);
  text-transform: uppercase;
  cursor: not-allowed;
  background: var(--btn-disabled-bg);
  color: var(--btn-disabled-text);
  pointer-events: none;
  transition:
    background var(--transition-med),
    border-color var(--transition-med),
    color var(--transition-med),
    box-shadow var(--transition-med);
  position: relative;
  overflow: hidden;
}

.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
  transform: translateX(-100%);
  will-change: transform;
}

/*
  STARE 1: câmpuri valide, fără checkbox terms → cyan
  Selector: .form cu :has() — specificitate (0,2,0) — OK, sub limita de 2
*/
.form:has(.field__input:required:valid:not(:placeholder-shown) ~ .field__label) .btn {
  cursor: pointer;
  pointer-events: all;
  background: var(--btn-active-bg);
  border-color: var(--btn-active-border);
  color: var(--color-text-primary);
  text-shadow: 0 0 10px rgba(0,242,255,0.50);
  animation: pulse-cyan 2s infinite;
}

.form:has(.field__input:required:valid:not(:placeholder-shown) ~ .field__label) .btn::before {
  animation: shimmer 2.5s infinite;
}

/*
  STARE 2 — Complex Selector Puzzle
  Butonul devine AMBER când:
    - toate câmpurile required sunt :valid
    - checkbox .terms__checkbox este :checked
  Zero JS. Zero ID-uri. Specificitate uniformă.
*/
.form:has(.terms__checkbox:checked):has(.field__input:required:valid:not(:placeholder-shown) ~ .field__label) .btn {
  background: var(--btn-terms-bg);
  border-color: var(--btn-terms-border);
  text-shadow: 0 0 10px var(--primitive-amber-60);
  animation: pulse-amber 2s infinite;
}

@keyframes pulse-cyan {
  0%, 100% { box-shadow: 0 0 15px rgba(0,242,255,0.15), 0 0 0 0   rgba(0,242,255,0.30); }
  50%       { box-shadow: 0 0 30px rgba(0,242,255,0.25), 0 0 0 8px rgba(0,242,255,0.00); }
}

@keyframes pulse-amber {
  0%, 100% { box-shadow: 0 0 15px rgba(255,170,0,0.20), 0 0 0 0   rgba(255,170,0,0.35); }
  50%       { box-shadow: 0 0 30px rgba(255,170,0,0.35), 0 0 0 8px rgba(255,170,0,0.00); }
}

@keyframes shimmer {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}


/* ════════════════════════════════════════════════════════════════
   GPU DEBUG MODE
   Activat cu clasa .debug pe <body>.
   Evidențiază elementele cu layer GPU separat.
   CRITERIU: selectori de tip .debug .clasa — max 2 niveluri — OK.
   ════════════════════════════════════════════════════════════════ */

.debug .page__grid-bg { outline: 2px solid var(--debug-color-layer-bg);    outline-offset: -2px; }
.debug .card          { outline: 2px solid var(--debug-color-layer-card);  outline-offset: -2px; }
.debug .field__label  { outline: 2px solid var(--debug-color-layer-label); outline-offset: -2px; }
.debug .field__dot    { outline: 2px solid var(--debug-color-layer-dot);   outline-offset: -2px; }
.debug .btn           { outline: 2px solid var(--debug-color-layer-btn);   outline-offset: -2px; }
.debug .services__tag { outline: 2px solid var(--debug-color-layer-tag);   outline-offset: -2px; }

.debug-badge { display: none; }

.debug .debug-badge {
  display: flex;
  gap: var(--space-7);
  flex-wrap: wrap;
  position: fixed;
  bottom: var(--primitive-space-16);
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.88);
  border: 1px solid var(--color-border-default);
  border-radius: var(--radius-sm);
  padding: var(--primitive-space-10) var(--primitive-space-16);
  font-size: 0.5rem;
  letter-spacing: var(--tracking-normal);
  z-index: 999;
}

.debug-badge__item {
  display: flex;
  align-items: center;
  gap: 5px;
  color: rgba(255,255,255,0.50);
}

.debug-badge__dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

  </style>
</head>

<body class="page" id="js-body">

  <div class="page__grid-bg" aria-hidden="true"></div>

  <div class="card">
    <header class="card__header">
      <h1 class="card__title">NEURAL_ACCESS</h1>
      <p class="card__subtitle">Cealic Damian &nbsp;·&nbsp; RC 251</p>
      <div class="divider" aria-hidden="true"></div>
    </header>

    <form class="form" novalidate>

      <!-- Field: Nume -->
      <div class="field">
        <input class="field__input" type="text" name="name"
               placeholder="name" required minlength="3" autocomplete="off" />
        <label class="field__label">NUME COMPLET</label>
        <span  class="field__dot"  aria-hidden="true"></span>
        <span  class="field__hint">Minim 3 caractere</span>
      </div>

      <!-- Field: Email -->
      <div class="field">
        <input class="field__input" type="email" name="email"
               placeholder="email" required autocomplete="off" />
        <label class="field__label">ADRESĂ EMAIL</label>
        <span  class="field__dot"  aria-hidden="true"></span>
        <span  class="field__hint">Format invalid</span>
      </div>

      <!-- Field: Parolă -->
      <div class="field">
        <input class="field__input" type="password" name="pass"
               placeholder="password" required minlength="8" pattern=".{8,}" autocomplete="off" />
        <label class="field__label">PAROLĂ</label>
        <span  class="field__dot"  aria-hidden="true"></span>
        <span  class="field__hint">Minim 8 caractere</span>
      </div>

      <!-- Empty State: Services -->
      <div class="services">
        <span class="services__label">SERVICII ACTIVE</span>
        <div class="services__list" id="js-service-list"></div>
        <div class="services__controls">
          <button type="button" class="services__btn" data-service="API_v2">+ API v2</button>
          <button type="button" class="services__btn" data-service="Neural DB">+ Neural DB</button>
          <button type="button" class="services__btn" data-service="Edge CDN">+ Edge CDN</button>
          <button type="button" class="services__btn" data-clear>✕ Clear</button>
        </div>
      </div>

      <!-- Checkbox: Termeni -->
      <label class="terms">
        <input class="terms__checkbox" type="checkbox" name="terms" />
        <span class="terms__box" aria-hidden="true"></span>
        <span class="terms__text">
          Accept <a class="terms__link" href="#" onclick="return false">Termenii și Condițiile</a>
        </span>
      </label>

      <button class="btn" type="submit">INIȚIALIZARE SISTEM</button>

    </form>

    <footer class="card__footer">
      NO-ID CSS &nbsp;·&nbsp; PRIMITIVE→SEMANTIC→COMPONENT &nbsp;·&nbsp; ZERO CLS
      &nbsp;·&nbsp;
      <button class="card__footer-action" id="js-debug-toggle">[DEBUG MODE]</button>
    </footer>
  </div>

  <!-- GPU Debug Legend -->
  <div class="debug-badge" aria-hidden="true">
    <span class="debug-badge__item"><span class="debug-badge__dot" style="background:#ff00c8"></span>page__grid-bg</span>
    <span class="debug-badge__item"><span class="debug-badge__dot" style="background:#00f2ff"></span>card</span>
    <span class="debug-badge__item"><span class="debug-badge__dot" style="background:#00ff88"></span>field__label</span>
    <span class="debug-badge__item"><span class="debug-badge__dot" style="background:#ffaa00"></span>field__dot</span>
    <span class="debug-badge__item"><span class="debug-badge__dot" style="background:#ff3c3c"></span>btn</span>
    <span class="debug-badge__item"><span class="debug-badge__dot" style="background:#64c8ff"></span>services__tag</span>
  </div>

  <script>
    /* JS minimal — doar services (empty state demo) și debug toggle */

    const list  = document.getElementById('js-service-list');
    const body  = document.getElementById('js-body');

    /* Services */
    document.querySelectorAll('.services__btn[data-service]').forEach(btn => {
      btn.addEventListener('click', () => {
        const name = btn.dataset.service;
        if ([...list.children].some(c => c.dataset.name === name)) return;
        const tag = document.createElement('span');
        tag.className   = 'services__tag';
        tag.dataset.name = name;
        tag.textContent = name;
        tag.addEventListener('click', () => tag.remove());
        list.appendChild(tag);
      });
    });

    document.querySelector('.services__btn[data-clear]')
      .addEventListener('click', () => list.innerHTML = '');

    /* Debug mode */
    document.getElementById('js-debug-toggle')
      .addEventListener('click', () => body.classList.toggle('debug'));
  </script>
</body>
</html>
